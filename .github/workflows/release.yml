name: Auto Bump & Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'

jobs:
  # ── Job 1: Auto-bump patch version on push to master ──────────────
  bump:
    # Skip bot commits (version bumps) to prevent infinite loop.
    # Also skip if this was triggered by a tag push.
    if: >-
      github.ref_type != 'tag' &&
      !contains(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump patch version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"

      - name: Commit and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $(node -p "require('./package.json').version")"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin master --tags

  # ── Job 2: Build and publish the release ──────────────────────────
  release:
    # Run after bump (push to master) OR directly on manual tag push.
    needs: [bump]
    if: always() && (needs.bump.result == 'success' || github.ref_type == 'tag')
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    # macOS build is allowed to fail (no Apple code-signing certificate) without
    # blocking the Windows build, which is the primary target for Hou.la shops.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    strategy:
      # Do not cancel the Windows build if the macOS build fails.
      fail-fast: false
      matrix:
        # Pin Windows to 2022: node-gyp 9.x cannot detect the Visual Studio
        # install on the newer windows-latest (Server 2025) image, breaking the
        # native-module rebuild (@serialport/bindings-cpp, better-sqlite3).
        os: [windows-2022, macos-latest]
    steps:
      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=refs/tags/${{ needs.bump.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Pin Python 3.11 so node-gyp can compile native modules
      # (@serialport/bindings-cpp). Python 3.12+ removed `distutils`,
      # which node-gyp's bundled gyp still imports, breaking the macOS build.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      # Compile main + preload (tsc) and copy the renderer into dist/ so that
      # electron-builder finds the app entry (dist/main/index.js). Without this,
      # packaging fails the sanity check on a missing entry file.
      - name: Build app
        run: npm run build

      - name: Publish release
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
